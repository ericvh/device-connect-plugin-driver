name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: device-connect-plugin-driver
            dockerfile: Dockerfile
          - image: dc-plugin-sidecar
            dockerfile: Dockerfile.sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=ci
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-arch manifest
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Build amd64 image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          tags: dc-smoke-${{ matrix.image }}:local
          cache-from: type=gha,scope=${{ matrix.image }}

      - name: Smoke test plugin host
        if: matrix.image == 'device-connect-plugin-driver'
        run: |
          docker run --rm --entrypoint python dc-smoke-${{ matrix.image }}:local \
            -c "from device_connect_plugin_driver.plugin_host import PluginHostDriver; print('ok')"

      - name: Smoke test sidecar image
        if: matrix.image == 'dc-plugin-sidecar'
        run: |
          docker run --rm --entrypoint python dc-smoke-${{ matrix.image }}:local \
            -c "import device_connect_plugin_driver.sidecar; print('ok')"
